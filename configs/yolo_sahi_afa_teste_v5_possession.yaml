project:
  name: match-events

input:
  video_path: data/raw/AFA Teste.mp4

output:
  output_dir: outputs/run_afa_teste_v5_possession
  save_annotated_video: true
  save_tracks_csv: true

pipeline:
  detector: yolo
  tracker: centroid
  pitch_mapper: none

models:
  yolo:
    model_path: runs/detect/runs/detect/train_remap_fix_v4/weights/best.pt
    confidence: 0.20
    class_confidence:
      ball: 0.10
      player: 0.20
      referee: 0.20
      goalkeeper: 0.20
    sahi:
      enabled: true
      slice_height: 768
      slice_width: 768
      overlap_height_ratio: 0.20
      overlap_width_ratio: 0.20

runtime:
  device: cpu
  batch_size: 1

tracking:
  centroid:
    max_missed_frames: 15
    max_center_distance: 90
    min_iou: 0.03
    class_history: 15
    ball_max_missed_frames: 24
    ball_max_center_distance: 130
    ball_min_confidence: 0.10
    ball_min_size: 3
    ball_max_size: 26
    ball_max_aspect_ratio: 2.0
  ball:
    interpolate: true
    max_gap_frames: 12

postprocessing:
  field_mask:
    enabled: true
    min_area_ratio: 0.08
    margin_px: 14
    top_ignore_ratio: 0.14
    close_kernel_size: 25
    open_kernel_size: 9
    min_green_saturation: 30
    min_green_value: 30
    hue_min: 26
    hue_max: 96
    perspective_filter_enabled: true
    near_min_height_ratio: 0.06
    far_min_height_ratio: 0.014
    near_max_height_ratio: 0.24
    far_max_height_ratio: 0.09
    min_width_to_height_ratio: 0.18
    max_width_to_height_ratio: 0.85
  ball_correction:
    enabled: true
    min_size: 3
    max_size: 22
    max_aspect_ratio: 1.8
    max_person_confidence: 0.22
    corrected_confidence: 0.10
  role_correction:
    enabled: true
    adaptive: true
    min_people: 8
    max_clusters: 4
    player_clusters: 2
    goal_side_ratio: 0.18
    memory_clusters: 5
    min_cluster_observations: 80
    max_pattern_distance: 0.18
    warmup_frames: 50
  team_assignment:
    enabled: true
    player_observations_required: 50
    player_max_distance: 0.18
    goalkeeper_max_distance: 0.24
    saturation_threshold: 35
    value_threshold: 35
    memory_size: 3
    referee_cluster_max_share: 0.28
    green_hue_min: 26
    green_hue_max: 96
    green_suppression_saturation: 28
    green_suppression_value: 28

analytics:
  possession:
    enabled: true
    max_ball_distance: 120
    carry_frames: 8
